<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 11 Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
</head>
<body>
    <div class="calculator-app">
        <div class="title-bar">
            <div class="left">
                <span class="icon">☰</span>
                <span class="title">Standard</span>
            </div>
            <div class="right">
                <span id="theme-toggle">🌙</span>
            </div>
        </div>

        <div class="display-area">
            <div id="history"></div>
            <input type="text" id="display" value="0" readonly>
        </div>

        <div class="memory-row">
            <button class="mem" data-action="memory-clear">MC</button>
            <button class="mem" data-action="memory-recall">MR</button>
            <button class="mem" data-action="memory-add">M+</button>
            <button class="mem" data-action="memory-subtract">M-</button>
            <button class="mem" data-action="memory-store">MS</button>
            <button class="mem" data-action="memory-list">M▾</button>
        </div>

        <div class="keypad">
            <button class="op" data-action="percent">%</button>
            <button class="op" data-action="clear-entry">CE</button>
            <button class="op" data-action="clear">C</button>
            <button class="op" data-action="backspace">⌫</button>

            <button class="op" data-action="reciprocal">1/x</button>
            <button class="op" data-action="square">x²</button>
            <button class="op" data-action="sqrt">√x</button>
            <button class="op" data-operator="/">÷</button>

            <button class="num" data-number="7">7</button>
            <button class="num" data-number="8">8</button>
            <button class="num" data-number="9">9</button>
            <button class="op" data-operator="*">×</button>

            <button class="num" data-number="4">4</button>
            <button class="num" data-number="5">5</button>
            <button class="num" data-number="6">6</button>
            <button class="op" data-operator="-">-</button>

            <button class="num" data-number="1">1</button>
            <button class="num" data-number="2">2</button>
            <button class="num" data-number="3">3</button>
            <button class="op" data-operator="+">+</button>

            <button class="num" data-action="toggle-sign">+/-</button>
            <button class="num" data-number="0">0</button>
            <button class="num" data-number=".">.</button>
            <button class="equals" data-action="calculate">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
